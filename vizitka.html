<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рессина Светлана Владимировна</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0B2FBF 0%, #1A4FFF 50%, #4B85FF 100%);
    padding: 24px;
    overflow-x: hidden;
  }

  /* Floating particles */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06) 1px, transparent 1px),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.06) 1px, transparent 1px),
      radial-gradient(circle at 50% 10%, rgba(255,255,255,0.04) 1px, transparent 1px),
      radial-gradient(circle at 10% 80%, rgba(255,255,255,0.04) 1px, transparent 1px),
      radial-gradient(circle at 90% 20%, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 300px 300px, 250px 250px, 400px 400px, 200px 200px, 350px 350px;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.10);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: 32px;
    padding: 52px 44px 44px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow:
      0 8px 32px rgba(13, 27, 110, 0.35),
      0 2px 8px rgba(0, 0, 0, 0.2),
      inset 0 1px 0 rgba(255,255,255,0.3);
    animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(32px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }

  /* Avatar circle */
  .avatar {
    width: 104px;
    height: 104px;
    border-radius: 50%;
    margin: 0 auto 24px;
    background: #1A4FFF;
    border: 3px solid rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25), 0 0 0 6px rgba(255,255,255,0.1);
    animation: avatarPulse 4s ease-in-out infinite;
    overflow: hidden;
  }

  @keyframes avatarPulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(0,0,0,0.2), 0 0 0 6px rgba(255,255,255,0.08); }
    50%       { box-shadow: 0 4px 24px rgba(0,0,0,0.25), 0 0 0 10px rgba(255,255,255,0.14); }
  }

  /* Name */
  .name {
    font-size: clamp(22px, 5vw, 28px);
    font-weight: 800;
    letter-spacing: -0.3px;
    line-height: 1.2;
    background: linear-gradient(90deg, #ffffff 0%, #b3e5fc 40%, #e1f5fe 70%, #ffffff 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
    filter: drop-shadow(0 0 12px rgba(179, 229, 252, 0.6));
    margin-bottom: 6px;
  }

  @keyframes shimmer {
    from { background-position: 0% center; }
    to   { background-position: 200% center; }
  }

  /* Divider */
  .divider {
    width: 60px;
    height: 3px;
    margin: 14px auto 16px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
    border-radius: 2px;
  }

  /* School badge */
  .school-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 999px;
    padding: 5px 14px 5px 10px;
    margin-bottom: 14px;
    animation: cardIn 0.9s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .school-badge span {
    font-size: 13px;
    font-weight: 700;
    color: #b3e5fc;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Specialization */
  .spec {
    color: rgba(255, 255, 255, 0.85);
    font-size: clamp(13px, 3vw, 15px);
    line-height: 1.65;
    max-width: 340px;
    margin: 0 auto 32px;
    animation: cardIn 0.9s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .spec strong {
    color: #ffffff;
    font-weight: 600;
  }

  /* Social links */
  .socials {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 28px;
    animation: cardIn 0.9s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .social-link {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 54px;
    height: 54px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.20);
    color: rgba(255, 255, 255, 0.9);
    text-decoration: none;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                background 0.2s ease,
                box-shadow 0.2s ease,
                border-color 0.2s ease;
  }

  .social-link svg { width: 26px; height: 26px; display: block; }

  .social-link:hover {
    transform: translateY(-5px) scale(1.08);
    background: rgba(255, 255, 255, 0.22);
    border-color: rgba(255, 255, 255, 0.45);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2), 0 0 16px rgba(255,255,255,0.15);
  }

  .social-link .tooltip {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%) scale(0.85);
    background: rgba(10, 25, 80, 0.9);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 8px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease, transform 0.18s ease;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .social-link:hover .tooltip {
    opacity: 1;
    transform: translateX(-50%) scale(1);
  }

  /* CTA Button */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #ffffff 0%, #e3f2fd 100%);
    color: #1A4FFF;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    padding: 15px 36px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2), 0 0 0 0 rgba(255,255,255,0.4);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.25s ease;
    animation: cardIn 0.9s 0.25s cubic-bezier(0.22, 1, 0.36, 1) both,
               ctaPulse 2.8s 1.5s ease-in-out infinite;
    position: relative;
    overflow: hidden;
  }

  .cta::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 60%);
    border-radius: inherit;
  }

  .cta:hover {
    transform: scale(1.06) translateY(-2px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.25), 0 0 0 6px rgba(255,255,255,0.15);
    animation: none;
  }

  @keyframes ctaPulse {
    0%,100% { box-shadow: 0 4px 20px rgba(0,0,0,0.2), 0 0 0 0   rgba(255,255,255,0.3); }
    50%      { box-shadow: 0 4px 24px rgba(0,0,0,0.25), 0 0 0 10px rgba(255,255,255,0); }
  }

  .cta svg { width: 20px; height: 20px; flex-shrink: 0; }

  /* Footer */
  .footer {
    margin-top: 28px;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.5px;
    animation: cardIn 0.9s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @media (max-width: 520px) {
    .card { padding: 40px 28px 36px; border-radius: 24px; }
    .social-link { width: 50px; height: 50px; border-radius: 14px; }
  }
</style>
</head>
